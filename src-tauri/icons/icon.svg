<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Logzilla">
  <title>Logzilla — 串口日志分析工具</title>
  <defs>
    <!-- 哥斯拉主体：霓虹淡蓝渐变 -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DF9FF"/>
      <stop offset="0.55" stop-color="#3EC8FF"/>
      <stop offset="1" stop-color="#2E9BFF"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A7F3FF"/>
      <stop offset="1" stop-color="#3EC8FF"/>
    </linearGradient>

    <!-- 霓虹光晕：模糊副本衬在清晰核心后 -->
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 单片背鳍（锯齿枫叶形，尖朝上） -->
    <g id="plate">
      <path d="M -20,6 L -10,-30 L -17,-50 L -7,-78 L -13,-105 L 0,-125 L 13,-105 L 7,-78 L 17,-50 L 10,-30 L 20,6 Z"
            fill="url(#spineGrad)"/>
    </g>

    <!-- 哥斯拉右侧淡出遮罩：左不透明 → 右透明 -->
    <linearGradient id="godFadeGrad" x1="235" y1="0" x2="365" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="1"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="godFade">
      <rect x="0" y="0" width="512" height="512" fill="url(#godFadeGrad)"/>
    </mask>

    <!-- 终端文字淡入遮罩：左透明 → 右不透明（与哥斯拉淡出在同一带交织） -->
    <linearGradient id="txtFadeGrad" x1="235" y1="0" x2="365" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="1" stop-color="#fff" stop-opacity="1"/>
    </linearGradient>
    <mask id="txtFade">
      <rect x="0" y="0" width="512" height="512" fill="url(#txtFadeGrad)"/>
    </mask>
  </defs>

  <!-- 哥斯拉剪影 + 背鳍（右侧淡出） -->
  <g filter="url(#neon)" mask="url(#godFade)">
    <!-- 主体轮廓：左朝向，立姿，尾部向右扫（淡出） -->
    <path fill="url(#bodyGrad)" d="
      M 30,305
      L 78,292 L 90,282 L 120,262 L 135,240 L 150,222
      L 170,200 L 195,178
      L 235,175 L 270,188 L 295,210
      L 335,225 L 380,215 L 420,230 L 440,255
      L 415,280 L 375,270 L 330,260
      L 300,270 L 290,330 L 302,400 L 294,460 L 266,470 L 250,455 L 260,390
      L 210,405
      L 180,395 L 176,460 L 146,470 L 130,455 L 140,385
      L 150,360 L 120,345 L 95,335 L 70,330 L 45,325 L 35,318
      Z"/>
    <!-- 背鳍沿背部排列 -->
    <use href="#plate" transform="translate(202,180) scale(0.50)"/>
    <use href="#plate" transform="translate(232,175) scale(0.74)"/>
    <use href="#plate" transform="translate(262,180) scale(0.90)"/>
    <use href="#plate" transform="translate(290,194) scale(0.64)"/>
    <use href="#plate" transform="translate(310,207) scale(0.40)"/>
    <!-- 眼睛点（小高亮） -->
    <circle cx="92" cy="262" r="4.5" fill="#0B3D61"/>
  </g>

  <!-- 终端字符内容（淡入，无窗口框） -->
  <g filter="url(#neon)" mask="url(#txtFade)"
     font-family="Consolas, 'Courier New', ui-monospace, monospace"
     font-size="20" font-weight="600">
    <!-- 命令行 + 提示符 -->
    <text x="248" y="192" fill="#D7F6FF">&gt; tail -f ttyUSB0</text>
    <!-- 串口日志行 -->
    <text x="248" y="220" fill="#9AE6FF">
      <tspan x="248">[01] CMD: RESET</tspan>
      <tspan x="248" dy="28">[02] EVT  0x01</tspan>
      <tspan x="248" dy="28">[03] ACL  &lt;=</tspan>
      <tspan x="248" dy="28">[04] 0x4A 0x03</tspan>
    </text>
    <!-- 闪烁块光标 -->
    <rect x="392" y="296" width="11" height="16" rx="2" fill="#EAFBFF"/>
  </g>
</svg>
